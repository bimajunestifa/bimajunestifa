name: Generate Pac-Man animation

on:
  schedule:
    - cron: "0 0 * * *"

  workflow_dispatch: {}

  push:
    branches:
      - main
    paths:
      - ".github/workflows/pacman.yml"

jobs:
  generate:
    permissions:
      contents: write

    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Generate Pac-Man contribution graph
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: bimajunestifa

      - name: Publish SVG files to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}